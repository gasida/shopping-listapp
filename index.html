<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon { font-size: 1.6rem; }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-row input {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: 2px solid transparent;
      transition: border-color 0.2s;
      color: #1a202c;
    }

    .add-row input:focus-visible { border-color: #667eea; }

    .add-row input::placeholder { color: #a0aec0; }

    .add-row button {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.25rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .add-row button:hover { background: #5a67d8; }
    .add-row button:active { transform: scale(0.95); }

    .stats {
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-done {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 2px 0;
      text-decoration: underline;
      display: none;
    }

    .clear-done.visible { display: inline; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      transition: opacity 0.2s, background 0.2s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      li { animation: none; }
    }

    li.done {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.7;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .empty .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }

    .error-banner {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
      font-size: 0.82rem;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }

    .error-banner.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="error-banner" id="errorBanner"></div>

    <div class="add-row">
      <input id="itemInput" type="text" placeholder="아이템 입력 후 Enter 또는 +" maxlength="80" aria-label="쇼핑 아이템 입력" />
      <button id="addBtn" title="추가">＋</button>
    </div>

    <div class="stats">
      <span id="statsText"></span>
      <button class="clear-done" id="clearDoneBtn">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">🧺</div>
      아직 아이템이 없어요.<br>위에서 추가해 보세요!
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://ndhxfvqamqgkycgtrvpn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lIWuocBAFKFP9h19bMb6HA_RBuC2um9';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const listEl       = document.getElementById('list');
    const inputEl      = document.getElementById('itemInput');
    const addBtn       = document.getElementById('addBtn');
    const statsEl      = document.getElementById('statsText');
    const clearDoneBtn = document.getElementById('clearDoneBtn');
    const emptyEl      = document.getElementById('empty');
    const errorEl      = document.getElementById('errorBanner');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.add('visible');
    }

    function clearError() {
      errorEl.classList.remove('visible');
    }

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('릩닝 목랙 ' + error.message);
        return;
      }
      clearError();
      items = data;
      render();
    }

    function render() {
      listEl.innerHTML = '';

      const doneCount = items.filter(i => i.done).length;
      statsEl.textContent = items.length
        ? `총 ${items.length}개 · 완료 ${doneCount}개`
        : '';
      clearDoneBtn.classList.toggle('visible', doneCount > 0);
      emptyEl.style.display = items.length ? 'none' : 'block';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.setAttribute('aria-label', `${item.text} 완료 여부`);
        cb.addEventListener('change', () => toggleItem(item.id, cb.checked));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.title = '삭제';
        delBtn.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(delBtn);
        listEl.appendChild(li);
      });
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;

      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      if (error) {
        showError('추가하지 못했습니다: ' + error.message);
        return;
      }
      clearError();
      items.push(data);
      inputEl.value = '';
      render();
      inputEl.focus();
    }

    async function toggleItem(id, done) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ done })
        .eq('id', id);

      if (error) {
        showError('부뛌 적하지 못했습니다: ' + error.message);
        return;
      }
      clearError();
      const item = items.find(i => i.id === id);
      if (item) item.done = done;
      render();
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제하지 못했습니다: ' + error.message);
        return;
      }
      clearError();
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDoneItems() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      if (doneIds.length === 0) return;

      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) {
        showError('완료 항목을 삭제하지 못했습니다: ' + error.message);
        return;
      }
      clearError();
      items = items.filter(i => !i.done);
      render();
    }

    addBtn.addEventListener('click', addItem);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    clearDoneBtn.addEventListener('click', clearDoneItems);

    loadItems();
  </script>
</body>
</html>
